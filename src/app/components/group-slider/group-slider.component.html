<ion-slides class="list-panel-slider" pager="true" [options]="sliderOptions">
  <ion-slide class="list-panel-slide">
    <div class="list-panel list-panel--create">
      <ion-button (click)="presentCreateList()">Create</ion-button>
      <div class="list-panel__background"></div>
    </div>
  </ion-slide>
  <ion-slide class="list-panel-slide" *ngFor="let list of lists">
    <div
      class="list-panel"
      (click)="selectList(list)"
      [@listItemFadeIn]="!list.active ? 'fade-in' : ''"
      (@listItemFadeIn.done)="listItemFadeInEnd($event, list)"
    >
      <p>{{ list.title }}</p>
      <!-- <p class="list-panel__count">3</p>
      <p class="list-panel__detail">
        <span class="list-panel__detail-value">3</span>/<span class="list-panel__detail-value"
          >4</span
        >
        completed
      </p> -->
      <div class="list-panel__background" [style.--background]="list.colour.hex"></div>
    </div>
  </ion-slide>
</ion-slides>
