<div class="cupertino-pane pane pane--create-item">
  <h1>create item</h1>
  <div class="body" hide-on-bottom overflow-y>
    <form [formGroup]="form" (ngSubmit)="submitForm()">
      <ion-list>
        <ion-item>
          <ion-label position="stacked">Title</ion-label>
          <ion-input inputMode="text" formControlName="name"></ion-input>
        </ion-item>
      </ion-list>
    </form>
    <div class="body-fixed">
      <div class="body-fixed__inner">
        <ion-button type="submit" expand="block" (click)="submitForm()" [disabled]="!form?.valid">
          Create
        </ion-button>
      </div>
    </div>
  </div>
</div>
