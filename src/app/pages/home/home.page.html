<ion-content
  #container
  [fullscreen]="true"
  [forceOverscroll]="true"
  [scrollEvents]="true"
  (ionScroll)="scrollEvent($event)"
>
  <div class="backdrop">
    <div class="content">
      <p class="title">{{ dayLong }}</p>
      <p class="subtitle">{{ day }}<sup>{{ getDateOrdinal(day) }}</sup> {{ month }}</p>
    </div>

    <app-group-slider></app-group-slider>
  </div>
  <div class="main" #main>
    <ion-button (click)="presentModal()">Open modal</ion-button>
  </div>
</ion-content>
